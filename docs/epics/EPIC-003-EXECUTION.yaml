        title: "Patient Create/Edit Forms"
        points: 8
        priority: HIGH
        status: Ready for Review
        dependencies: "STORY-003-001 ✅, STORY-003-002 ✅, STORY-003-003 ✅"
        blocking_for: "Wave 3 (WhatsApp integration)"

    description: |
      Wave 2 implements write operations for patient management.
      STORY-003-004 is Ready for Review — forms with validation, auto-save, and Supabase integration complete.
      Remaining tasks: File upload for documents, delete confirmation, audit trail verification.
      Critical: Must validate RLS policies for write operations before production.

    risks:
      - Form state management with auto-save
      - File upload quota and storage
      - Concurrent edit conflicts (optimistic locking)
      - Audit trail completeness

    qate_gates:
      - "Create patient form submits successfully to Supabase"
      - "Edit form loads patient data and persists changes"
      - "Form validation prevents invalid data"
      - "File upload working (if configured)"
      - "Delete confirmation present"
      - "Audit trail logging all changes"

