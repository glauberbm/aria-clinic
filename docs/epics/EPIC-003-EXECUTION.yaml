        status: Pending
        dependencies: "STORY-003-001 ✅, STORY-003-004 ✅"
        blocking_for: "EPIC-003 COMPLETE"

    description: |
      Wave 3 integrates ArIA Agent WhatsApp for patient communications.
      Connects patient communication system to automated appointment reminders, treatment updates, and patient engagement.
      Includes message templates, delivery tracking, conversation history, and opt-in/opt-out preferences.
      Final integration story — completes patient engagement loop.

    risks:
      - WhatsApp API rate limits and delivery SLA
      - Message template localization
      - Opt-in/opt-out preference synchronization
      - Conversation history storage
      - Error handling and retry logic

    qate_gates:
      - "WhatsApp message templates configured"
      - "Appointment reminders sent 24h before"
      - "Patient preferences (opt-in/opt-out) respected"
      - "Message delivery tracking working"
      - "Conversation history stored in system"
      - "Error handling and retries functioning"

