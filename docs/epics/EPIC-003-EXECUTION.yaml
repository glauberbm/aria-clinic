      Wave 1 establishes the patient database foundation and core read-only views.
      STORY-003-001 is COMPLETE — comprehensive schema with RLS policies, LGPD compliance, and audit logging.
      STORY-003-002 & STORY-003-003 are Ready for Review — patient list and detail pages fully implemented.
      Critical: Schema RLS policies must be validated before Wave 2 begins (write operations).

    risks:
      - RLS policies edge cases with role-based access
      - Query performance at scale (1000+ patients)
      - LGPD audit log retention and access

    qate_gates:
